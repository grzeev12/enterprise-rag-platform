name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app:
    name: Validate application
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public
      AUTH_SECRET: ci-auth-secret-ci-auth-secret-ci-auth-secret
      NEXTAUTH_SECRET: ci-auth-secret-ci-auth-secret-ci-auth-secret
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      REDIS_URL: ""
      OBJECT_STORAGE_PROVIDER: azure-blob
      OBJECT_STORAGE_CONTAINER: enterprise-ai-saas-ci
      AZURE_STORAGE_CONNECTION_STRING: ""
      AZURE_STORAGE_CONTAINER_NAME: ""
      OPENAI_API_KEY: ""
      OPENAI_CHAT_MODEL: gpt-4o-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PRIVATE_BUILD_WORKER: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma validate
        run: npx prisma validate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build with blank optional infrastructure
        run: npm run build
