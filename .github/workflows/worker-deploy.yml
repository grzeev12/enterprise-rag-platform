name: Worker Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag
        required: true
        default: latest

jobs:
  azure-container-apps:
    name: Deploy worker to Azure Container Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build worker image
        run: docker build -f Dockerfile.worker -t ${{ secrets.ACR_LOGIN_SERVER }}/enterprise-ai-saas-worker:${{ inputs.image_tag }} .

      - name: Push worker image
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/enterprise-ai-saas-worker:${{ inputs.image_tag }}

      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/enterprise-ai-saas-worker:${{ inputs.image_tag }}
