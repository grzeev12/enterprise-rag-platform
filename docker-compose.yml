services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-ai-saas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_ai_saas
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_ai_saas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: enterprise-ai-saas-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: enterprise-ai-saas-azurite
    command: azurite-blob --blobHost 0.0.0.0 --location /data --loose
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: enterprise-ai-saas-worker
    profiles:
      - worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/enterprise_ai_saas?schema=public
      REDIS_URL: redis://redis:6379
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNo3L9bk5w9aiUh6CmhWpcJSkWc6Ydpqv6DqS4ENhDNQw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      AZURE_STORAGE_CONTAINER_NAME: enterprise-ai-saas
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      azurite:
        condition: service_started

volumes:
  postgres-data:
  azurite-data:
